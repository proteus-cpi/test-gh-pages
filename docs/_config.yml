title: "My Jekyll Blog"
description: "A simple blog built with Jekyll"
baseurl: "/test-gh-pages"         # the subpath of your site, e.g. /blog
url: "https://proteus-cpi.github.io"    # the base hostname & protocol for your site e.g. http://example.com 

collections:
  authors:
    output: true

defaults:
  - scope:
      path: ""
      type: "authors"
    values:
      layout: "author"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "default"

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag